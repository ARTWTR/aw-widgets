<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ledger Lifecycle</title>

  <!-- Shared design system -->
  <link rel="stylesheet" href="./assets/design-tokens-v1.css">
  <link rel="stylesheet" href="./assets/components-v1.css">

  <!-- Zoho Widget JS SDK v2 -->
  <script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>

  <!-- Shared base widget JS -->
  <script src="./assets/base-widget-v1.js"></script>
</head>
<body>
  <div class="tile">
    <div class="grid-3">
      <!-- Review column -->
      <div class="col" id="col-review" data-report="to_review" data-title="Pending Review">
        <div class="label">Review</div>
        <div class="badge" id="badge-review"><div class="number" id="count-review">—</div></div>
        <div class="sublabel">Reviewer</div>
      </div>

      <!-- Verify column -->
      <div class="col" id="col-verify" data-report="Ledgers_To_Approve" data-title="Pending Approval">
        <div class="label">Verify</div>
        <div class="badge" id="badge-verify"><div class="number" id="count-verify">—</div></div>
        <div class="sublabel">Accounts</div>
      </div>

      <!-- Send column -->
      <div class="col" id="col-send" data-report="Ledgers_To_Send" data-title="Ready to Send">
        <div class="label">Send</div>
        <div class="badge" id="badge-send"><div class="number" id="count-send">—</div></div>
        <div class="sublabel">Anyone</div>
      </div>
    </div>
    <div class="version-marker">v3.1</div>
    <div class="debug-overlay"></div>
  </div>

  <script>
    (function() {
      'use strict';

      AWW.init({ appName: 'aw-operations' });

      var REPORTS = [
        { name: 'to_review', countId: 'count-review', badgeId: 'badge-review', colId: 'col-review' },
        { name: 'Ledgers_To_Approve', countId: 'count-verify', badgeId: 'badge-verify', colId: 'col-verify' },
        { name: 'Ledgers_To_Send', countId: 'count-send', badgeId: 'badge-send', colId: 'col-send' }
      ];

      function updateCount(report, count) {
        var el = document.getElementById(report.countId);
        var badge = document.getElementById(report.badgeId);
        if (el) el.textContent = (count === null ? '—' : count);
        if (badge) {
          // Toggle the "has items" ring based on count > 0
          if (count && parseInt(count, 10) > 0) {
            badge.classList.add('badge--has-items');
          } else {
            badge.classList.remove('badge--has-items');
          }
        }
      }

      function refreshAll() {
        var tasks = REPORTS.map(function(report) {
          return function() {
            return AWW.fetchCount(report.name).then(function(count) {
              updateCount(report, count);
            });
          };
        });
        return AWW.runSequential(tasks);
      }

      // Tap-to-expand: when user taps a column, open drawer with records
      function attachTapHandlers() {
        REPORTS.forEach(function(report) {
          var col = document.getElementById(report.colId);
          if (!col) {
            AWW.debug('Tap handler: column not found ' + report.colId, 'error');
            return;
          }
          AWW.debug('Tap handler attached: ' + report.colId, 'info');

          // Use pointerup — more reliable than click inside iframes on mobile
          // Falls back to click for non-pointer browsers
          var fired = false;
          col.addEventListener('pointerup', function(e) {
            if (fired) return;
            fired = true;
            setTimeout(function() { fired = false; }, 300); // dedupe
            AWW.debug('TAP: ' + report.colId, 'success');
            openRecordsDrawer(report);
          });
          col.addEventListener('click', function(e) {
            if (fired) return;
            fired = true;
            setTimeout(function() { fired = false; }, 300);
            AWW.debug('CLICK: ' + report.colId, 'success');
            openRecordsDrawer(report);
          });
        });
      }

      function openRecordsDrawer(report) {
        var col = document.getElementById(report.colId);
        var title = col.dataset.title || report.name;

        AWW.Drawer.open({ title: title, content: '<div class="drawer-content__loading">Loading records...</div>' });

        AWW.fetchRecords(report.name).then(function(records) {
          if (!records || records.length === 0) {
            AWW.Drawer.setEmpty('No records in this queue.');
            return;
          }

          var html = records.map(function(rec) {
            // Try to extract a meaningful title from the record
            // Common field names: client name, customer name, etc.
            var title = rec.client_name || rec.customer_name || rec.Name || rec.title ||
                        (rec.books_customer && rec.books_customer.display_value) ||
                        rec.Email || rec.ID || 'Record ' + (rec.ID || '');
            var meta = rec.Added_Time || rec.Modified_Time || '';

            return '<div class="list-item" data-record-id="' + (rec.ID || '') + '">' +
                     '<div class="list-item__title">' + escapeHtml(String(title)) + '</div>' +
                     (meta ? '<div class="list-item__meta">' + escapeHtml(formatTime(meta)) + '</div>' : '') +
                     '<div class="list-item__chevron">›</div>' +
                   '</div>';
          }).join('');

          AWW.Drawer.setContent(html);
        });
      }

      function escapeHtml(s) {
        return s.replace(/[&<>"']/g, function(c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }

      function formatTime(t) {
        // Best-effort time formatting
        if (!t) return '';
        try {
          var d = new Date(t);
          if (isNaN(d.getTime())) return t;
          var diff = Date.now() - d.getTime();
          var hours = Math.floor(diff / 3600000);
          if (hours < 1) return 'just now';
          if (hours < 24) return hours + 'h ago';
          return Math.floor(hours / 24) + 'd ago';
        } catch (e) { return t; }
      }

      function init() {
        attachTapHandlers();
        refreshAll();
        setInterval(refreshAll, 60000);
        AWW.enablePullToRefresh(refreshAll);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
