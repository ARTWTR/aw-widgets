<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ledger Lifecycle</title>

  <!--
    Zoho Creator Widget JS SDK v2
    Provides ZOHO.CREATOR.DATA.* APIs for fetching record counts.
    Must load BEFORE our inline script attempts to use it.
  -->
  <script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: #141618;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #FFFFFF;
      overflow: hidden;
      min-height: 100vh;
      height: 100%;
      width: 100%;
    }

    .tile {
      background: #141618;
      padding: 14px 10px;
      width: 100%;
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      align-items: center;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px;
      align-items: center;
      width: 100%;
    }

    .col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .label {
      font-size: 11px;
      color: #A8C5E5;
      letter-spacing: 0.2px;
      text-align: center;
    }

    .badge {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(145deg, #2a2e34, #1c1f24);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.04) inset,
        0 4px 12px rgba(0, 0, 0, 0.4);
      transition: opacity 0.2s ease;
    }

    .badge.loading {
      opacity: 0.5;
    }

    .number {
      font-size: 22px;
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1;
    }

    .sublabel {
      font-size: 10px;
      color: #A8C5E5;
      text-align: center;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="tile">
    <div class="grid">
      <div class="col">
        <div class="label">Review</div>
        <div class="badge" id="badge-review"><div class="number" id="review-count">—</div></div>
        <div class="sublabel">Reviewer</div>
      </div>
      <div class="col">
        <div class="label">Verify</div>
        <div class="badge" id="badge-verify"><div class="number" id="verify-count">—</div></div>
        <div class="sublabel">Accounts</div>
      </div>
      <div class="col">
        <div class="label">Send</div>
        <div class="badge" id="badge-send"><div class="number" id="send-count">—</div></div>
        <div class="sublabel">Anyone</div>
      </div>
    </div>
  </div>

  <!--
    NAMING RULE: Subtitles are ROLES, never PERSON NAMES.
    Per AW_WIDGETS_Foundation_Decision.md — widgets must remain neutral
    as team membership changes.

    DATA SOURCE: Three Creator reports
      - to_review (Reviewer queue)
      - Ledgers_To_Approve (Accounts queue)
      - Ledgers_To_Send (Anyone queue)

    REFRESH: Counts auto-refresh every 60 seconds while widget is open.

    FALLBACK: If SDK fails to load or API fails, displays "—" instead
    of crashing. All errors logged to console for debugging.
  -->

  <script>
    (function() {
      'use strict';

      // App config — these match the Creator app structure
      var APP_NAME = 'aw-operations';
      var REPORTS = [
        { name: 'to_review', elementId: 'review-count', badgeId: 'badge-review' },
        { name: 'Ledgers_To_Approve', elementId: 'verify-count', badgeId: 'badge-verify' },
        { name: 'Ledgers_To_Send', elementId: 'send-count', badgeId: 'badge-send' }
      ];

      var REFRESH_INTERVAL_MS = 60 * 1000; // 60 seconds

      function setLoading(loading) {
        REPORTS.forEach(function(r) {
          var badge = document.getElementById(r.badgeId);
          if (badge) {
            if (loading) {
              badge.classList.add('loading');
            } else {
              badge.classList.remove('loading');
            }
          }
        });
      }

      function updateCount(elementId, count) {
        var el = document.getElementById(elementId);
        if (el) {
          el.textContent = count;
        }
      }

      function fetchReportCount(report) {
        var config = {
          app_name: APP_NAME,
          report_name: report.name
        };

        console.log('[ledger-lifecycle] Fetching count for ' + report.name);

        return ZOHO.CREATOR.DATA.getRecordCount(config)
          .then(function(response) {
            console.log('[ledger-lifecycle] Response for ' + report.name + ':', response);
            if (response && response.code === 3000 && response.result) {
              var count = response.result.records_count;
              updateCount(report.elementId, count);
              return count;
            } else {
              console.warn('[ledger-lifecycle] Unexpected response shape for ' + report.name, response);
              updateCount(report.elementId, '?');
              return null;
            }
          })
          .catch(function(err) {
            console.error('[ledger-lifecycle] Error fetching ' + report.name + ':', err);
            // Zoho returns code 9220 ("No records exist") for empty reports.
            // This is not really an error — it just means count = 0.
            if (err && (err.code === 9220 || (err.responseText && err.responseText.indexOf('9220') !== -1))) {
              console.log('[ledger-lifecycle] ' + report.name + ' is empty — treating as 0');
              updateCount(report.elementId, '0');
              return 0;
            }
            updateCount(report.elementId, '!');
            return null;
          });
      }

      function refreshAllCounts() {
        if (typeof ZOHO === 'undefined' || !ZOHO.CREATOR || !ZOHO.CREATOR.DATA) {
          console.warn('[ledger-lifecycle] Zoho SDK not available — skipping refresh. (This is expected if widget is viewed directly on GitHub.)');
          REPORTS.forEach(function(r) { updateCount(r.elementId, '—'); });
          return;
        }

        setLoading(true);
        var promises = REPORTS.map(fetchReportCount);
        Promise.all(promises).finally(function() {
          setLoading(false);
        });
      }

      function init() {
        console.log('[ledger-lifecycle] Initializing widget...');

        var inZoho = (typeof ZOHO !== 'undefined' && ZOHO.CREATOR && ZOHO.CREATOR.DATA);
        if (!inZoho) {
          console.warn('[ledger-lifecycle] Zoho Creator SDK not detected. Widget is likely being viewed standalone (e.g. directly on GitHub Pages). Counts will display as dashes.');
          return;
        }

        console.log('[ledger-lifecycle] Zoho SDK detected. Fetching live counts.');
        refreshAllCounts();
        setInterval(refreshAllCounts, REFRESH_INTERVAL_MS);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
